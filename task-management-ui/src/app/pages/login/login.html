<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width: 400px; border-radius: 16px;">

    <div class="text-center mb-4">

      <h1 class="fw-bold">
        Task Management System
      </h1>

      <p class="text-muted">
        Sign in to continue
      </p>

    </div>

    <div class="mb-3">

      <label class="form-label">
        Username
      </label>

      <input type="text" class="form-control form-control-lg" placeholder="Enter Username" [(ngModel)]="name">
      <div *ngIf="errorMessage" class="alert alert-danger mt-3">
        {{ errorMessage }}
      </div>
    </div>

    <button class="btn btn-primary btn-lg w-100" (click)="login()">

      Login

    </button>

  </div>

</div>
