<app-navbar></app-navbar>
<div class="container mt-5">
  <div class="card p-4 mb-4">
    <h2>Create Task</h2>
    <input type="text" class="form-control mb-2" placeholder="Title" [(ngModel)]="title" />
    <textarea class="form-control mb-3" placeholder="Description" [(ngModel)]="description"></textarea>
    <select class="form-control" [(ngModel)]="status">
      <option value="1">Open</option>
      <option value="2">In Progress</option>
      <option value="3">Closed</option>
    </select>
    <div *ngIf="isAdmin" class="mt-3">
      <label for="userSelect">Assign To:</label>
      <select class="form-control mb-3" [(ngModel)]="selectedUserId" id="userSelect">
        <option value="">Select User</option>
        <option *ngFor="let user of users" [value]="user.id">
          {{ user.name }}
        </option>

      </select>
    </div>
    <button class="btn btn-primary" *ngIf="!editingTaskId" (click)="createTask()">Create Task</button>
    <button class="btn btn-primary" *ngIf="editingTaskId" (click)="saveTask()">Save Task</button>

  </div>
  <div class="card p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

      <h2 class="mb-0">
        My Tasks
      </h2>

      <span class="badge bg-dark fs-6">
        {{ tasks.length }} Tasks
      </span>

    </div>

    <div class="row">

      <div class="col-md-6 col-lg-4 mb-4" *ngFor="let task of tasks">

        <div class="card shadow-sm h-100">

          <div class="card-body d-flex flex-column">

            <h5 class="card-title">
              {{ task.title }}
            </h5>

            <p class="text-muted flex-grow-1">
              {{ task.description }}
            </p>

            <p class="mb-2">

              <strong>Assigned To:</strong>

              {{ getUserName(task.userId) }}

            </p>

            <div class="mb-3">

              <strong>Status:</strong>
              <select class="form-select form-select-sm d-inline w-auto ms-2" [(ngModel)]="task.status"
                (ngModelChange)="updateStatus(task, $event)">
                <option value="1">Open</option>
                <option value="2">In Progress</option>
                <option value="3">Closed</option>
              </select>
            </div>

            <div class="d-flex gap-2 mt-auto">

              <button class="btn btn-warning btn-sm w-100" (click)="editTask(task)">

                Edit

              </button>

              <button *ngIf="isAdmin" class="btn btn-danger btn-sm w-100" (click)="deleteTask(task.id)">

                Delete

              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>
</div>
